  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(--accent); color:var(--accent);\">GitHub<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/hannah-pham-data/\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:8px; background:transparent; color:#1E3A52; padding:13px 24px; border-radius:2px; border:1px solid rgba(30,58,82,0.2); font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.02em;\" style-hover=\"border-color:var(--accent); color:var(--accent);\">LinkedIn<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative; aspect-ratio:4/5; border-radius:4px; overflow:hidden; background-color:#DCEAF1; background-image:repeating-linear-gradient(135deg, color-mix(in oklab, var(--accent) 10%, transparent) 0 12px, transparent 12px 24px); border:1px solid rgba(30,58,82,0.08); display:flex; align-items:flex-end; justify-content:center; padding:20px;\">\n      <span style=\"font-family:'DM Mono',monospace; font-size:12px; color:#7C8B96; background:rgba(235,244,248,0.85); padding:6px 12px; border-radius:2px;\">hero photo of hannah<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT -->\n  <section id=\"about\" style=\"padding:8vh 6vw; max-width:1320px; margin:0 auto; border-top:1px solid rgba(30,58,82,0.08);\">\n    <div>\n      <div style=\"text-align:center; margin:0 auto 44px; max-width:640px;\">\n        <div style=\"font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.16em; color:var(--accent); opacity:0.65;\">01<\u002Fdiv>\n        <h2 style=\"font-family:'Playfair Display',serif; font-style:italic; font-weight:400; font-size:clamp(28px,3vw,38px); color:#1E3A52; margin-top:10px; letter-spacing:-0.01em;\">My path<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"max-width:720px; margin:0 auto;\">\n        <p style=\"font-family:'Playfair Display',serif; font-size:clamp(22px,2.4vw,30px); line-height:1.42; color:#1E3A52; text-wrap:pretty;\">I started with econometrics at UCLA because I was obsessed with understanding <span style=\"font-style:italic; color:var(--accent);\">why<\u002Fspan> things happen, not just what happened.<\u002Fp>\n        <p style=\"font-size:17px; line-height:1.72; color:#48606F; margin-top:26px; text-wrap:pretty;\">After graduating I jumped into healthcare analytics at Exodus Recovery, where I spent 2.5 years building EHR pipelines and clinical dashboards for 2,000+ clients across 4 counties. Real messy data, real stakes. That experience made me want to go deeper on the ML side, so I came back to school for my MS at UCSD.<\u002Fp>\n        <p style=\"font-size:17px; line-height:1.72; color:#48606F; margin-top:20px; text-wrap:pretty;\">Now I'm doing research at the Wu Tsai Human Performance Alliance and a cognitive science lab, working on SAM Audio for speaker diarization, while looking for opportunities where I can bring both sides together.<\u002Fp>\n        <p style=\"font-size:17px; line-height:1.72; color:#48606F; margin-top:20px; text-wrap:pretty;\">I've been obsessed with Sherlock Holmes since I was a kid. What I actually loved was the idea that if you look carefully enough, the data tells you everything. Turns out that's just data science with better outfits.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CURRENT FOCUS -->\n  <section style=\"padding:6vh 6vw; max-width:1320px; margin:0 auto; border-top:1px solid rgba(30,58,82,0.08);\">\n    <div style=\"text-align:center; margin:0 auto 44px; max-width:640px;\">\n      <div style=\"font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.16em; color:var(--accent); opacity:0.65;\">02<\u002Fdiv>\n      <h2 style=\"font-family:'Playfair Display',serif; font-style:italic; font-weight:400; font-size:clamp(28px,3vw,38px); color:#1E3A52; margin-top:10px; letter-spacing:-0.01em;\">Current focus<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:20px;\">\n      <div style=\"background:#FFFFFF; border:1px solid rgba(30,58,82,0.09); border-radius:4px; padding:26px 24px;\" style-hover=\"border-color:color-mix(in oklab, var(--accent) 40%, transparent);\">\n        <div style=\"font-family:'Playfair Display',serif; font-size:20px; line-height:1.2; color:#1E3A52; margin-bottom:12px;\">Downtown SD Homeless Analysis<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.6; color:#48606F;\">Forecasting and hotspot analysis on 10+ years of data.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid rgba(30,58,82,0.09); border-radius:4px; padding:26px 24px;\" style-hover=\"border-color:color-mix(in oklab, var(--accent) 40%, transparent);\">\n        <div style=\"font-family:'Playfair Display',serif; font-size:20px; line-height:1.2; color:#1E3A52; margin-bottom:12px;\">Causal inference<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.6; color:#48606F;\">Econometrics applied to real policy and health outcomes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid rgba(30,58,82,0.09); border-radius:4px; padding:26px 24px;\" style-hover=\"border-color:color-mix(in oklab, var(--accent) 40%, transparent);\">\n        <div style=\"font-family:'Playfair Display',serif; font-size:20px; line-height:1.2; color:#1E3A52; margin-bottom:12px;\">SAM Audio pipeline<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.6; color:#48606F;\">Speaker diarization research at UCSD cognitive science lab.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:#FFFFFF; border:1px solid rgba(30,58,82,0.09); border-radius:4px; padding:26px 24px;\" style-hover=\"border-color:color-mix(in oklab, var(--accent) 40%, transparent);\">\n        <div style=\"font-family:'Playfair Display',serif; font-size:20px; line-height:1.2; color:#1E3A52; margin-bottom:12px;\">LLMs on clinical data<\u002Fdiv>\n        <div style=\"font-size:14.5px; line-height:1.6; color:#48606F;\">LoRA/PEFT, domain adaptation without compute overhead.<\u002F A/PEFT<\u002Fspan>\n            <span style=\"font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); border:1px solid color-mix(in oklab, var(--accent) 28%, transparent); padding:4px 10px; border-radius:2px;\">NLP<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"https://github.com/hannahmypham/PeerMind-AI-Powered-Academic-Paper-Review\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; margin-top:18px; font-family:'DM Mono',monospace; font-size:13px; color:var(--accent); border-bottom:1px solid color-mix(in oklab, var(--accent) 35%, transparent); padding-bottom:2px;\" style-hover=\"border-color:var(--accent);\">View on GitHub →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"text-align:right;\">\n          <div style=\"font-family:var(--stat-font); font-size:38px; line-height:1; color:var(--accent);\">84.8%<\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace; font-size:11.5px; color:#7C8B96; margin-top:6px; letter-spacing:0.02em;\">decision alignment<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:0.9fr 1.4fr 0.7fr; gap:40px; padding:34px 0; border-top:1px solid rgba(30,58,82,0.12); align-items:start;\">\n        <div>\n          <div style=\"font-family:'Playfair Display',serif; font-size:30px; line-height:1.1; color:#1E3A52;\">ClaimWise AI<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:16px; line-height:1.65; color:#48606F; margin-bottom:18px;\">AI assistant on Google Cloud and BigQuery Vector Search for automated insurance fraud detection.<\u002Fp>\n          <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n            <span style=\"font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); border:1px solid color-mix(in oklab, var(--accent) 28%, transparent); padding:4px 10px; border-radius:2px;\">Google Cloud<\u002Fspan>\n            <span style=\"font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); border:1px solid color-mix(in oklab, var(--accent) 28%, transparent); padding:4px 10px; border-radius:2px;\">BigQuery<\u002Fspan>\n            <span style=\"font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); border:1px solid color-mix(in oklab, var(--accent) 28%, transparent); padding:4px 10px; border-radius:2px;\">Gemini<\u002Fspan>\n            <span style=\"font-family:'DM Mono',monospace; font-size:12px; color:var(--accent); border:1px solid color-mix(in oklab, var(--accent) 28%, transparent); padding:4px 10px; border-radius:2px;\">RAG<\u002Fspan>\n          <\u002Fdiv>\n          <a href=\"https://github.com/hannahmypham/ClaimWise-AI-Automated-Insurance-Fraud-Detection\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block; margin-top:18px; font-family:'DM Mono',monospace; font-size:13px; color:var(--accent); border-bottom:1px solid color-mix(in oklab, var(--accent) 35%, transparent); padding-bottom:2px;\" style-hover=\"border-color:var(--accent);\">View on GitHub →<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"text-align:right;\">\n          <div style=\"font-family:var(--stat-font); font-size:38px; line-height:1; color:var(--accent);\">95%+<\u002Fdiv>\n          <div style=\"font-family:'DM Mono',monospace; font-size:11.5px; color:#7C8B96; margin-top:6px; letter-spacing:0.02em;\">fraud detection accuracy<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:0.9fr 1.4fr 0.7fr; gap:40px; padding:34px 0; border-top:1px solid rgba(30,58,82,0.12); border-bottom:1px solid rgba(30,58,82,0.12); align-items:start;\">\n        <div>\n          <div style=\"font-family:'Playfair Display',serif; font-size:30px; line-height:1.1; color:#1E3A52;\">Downtown SD Homeless Analysis<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <p style=\"font-size:16px; line-height:1.65; color:#48606F; margin-bottom:18px;\">Forecasting and hotspot analysis on 10+ years of uns ue;\n    const mono = this.props.monoStats ?? true;\n\n    const gridImg =\n      'linear-gradient(to right, color-mix(in oklab, ' + accent + ' 9%, transparent) 1px, transparent 1px),' +\n      'linear-gradient(to bottom, color-mix(in oklab, ' + accent + ' 9%, transparent) 1px, transparent 1px)';\n\n    const themeStyle = {\n      '--accent': accent,\n      '--accent-dark': 'color-mix(in oklab, ' + accent + ' 78%, black)',\n      '--stat-font': mono ? \"'DM Mono', monospace\" : \"'Playfair Display', serif\",\n      minHeight: '100vh',\n      width: '100%',\n      overflowX: 'hidden',\n      background: '#EBF4F8',\n      backgroundImage: grid ? gridImg : 'none',\n      backgroundSize: grid ? '30px 30px' : 'auto',\n    };\n\n    return { themeStyle };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
